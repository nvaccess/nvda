[globalCommands.GlobalCommands]
# Suitable keyboard shortcuts for
# Finnish keyboard layouts
	None = kb(laptop):NVDA+[, kb(laptop):NVDA+], kb(laptop):NVDA+control+[, kb(laptop):NVDA+control+], kb(laptop):shift+NVDA+[, kb(laptop):shift+NVDA+], kb:NVDA+shift+=
	leftMouseClick = kb(laptop):NVDA+ö
	toggleLeftMouseButton = kb(laptop):NVDA+control+ö
	rightMouseClick = kb(laptop):NVDA+ä
	toggleRightMouseButton = kb(laptop):NVDA+control+ä
	navigatorObject_previousInFlow = kb(laptop):shift+NVDA+i
	navigatorObject_nextInFlow = kb(laptop):shift+NVDA+o
# Map a working zoom in keyboard shortcut for Finnish keyboard layouts
	zoomIn = kb:NVDA+shift+plus

# For Word and Outlook
[NVDAObjects.window.winword.WordDocument]
# Suitable keyboard shortcuts for
# Finnish keyboard layouts
	None = kb:control+[, kb:control+], kb:control+=, kb:control+shift+=, kb:control+shift+plus, kb:control+plus, kb:control+e, kb:control+l, kb:control+r, kb:control+b, kb:control+shift+b, kb:control+shift+d, kb:control+u, kb:control+shift+u, kb:control+shift+w, kb:control+i, kb:control+shift+i, kb:control+t, kb:control+shift+t, kb:control+m, kb:control+1, kb:control+2, kb:control+5, kb:control+0, kb:control+shift+a, kb:control+shift+k, kb:control+shift+8
	increaseDecreaseFontSize = kb:control+<, kb:control+shift+<
	toggleSuperscriptSubscript = kb:control+shift+plus, kb:control+plus
	increaseDecreaseOutlineLevel = kb:alt+1, kb:alt+2, kb:alt+3
	toggleAlignment = kb:control+e, kb:control+r, kb:control+l
	changeParagraphLeftIndent = kb:control+t, kb:control+shift+t, kb:control+m
	changeParagraphSpacing = kb:control+0
	changeLineSpacing = kb:control+1, kb:control+2, kb:control+5
	toggleBold = kb:control+b, kb:control+shift+b
	toggleUnderline = kb:control+u, kb:control+shift+d, kb:control+shift+u, kb:control+shift+w
	toggleItalic = kb:control+i, kb:control+shift+i
	toggleCaps = kb:control+shift+a, kb:control+shift+k
	toggleDisplayNonprintingCharacters = kb:control+shift+8

# For Outlook only
[appModules.outlook.BaseOutlookWordDocument]
	changeCase = kb:control+shift+a

# For Excel
[NVDAObjects.window.excel.ExcelWorksheet]
# Remapping the following keyboard
# shortcuts to their original keys fixes
# an issue that causes NVDA to announce
# the command results twice
	None = kb:control+b, kb:control+i, kb:control+u, kb:control+5
	toggleBold = kb:control+b
	toggleItalic = kb:control+i
	toggleUnderline= kb:control+u
	toggleStrikethrough = kb:control+5
